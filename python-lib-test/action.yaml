name: Test Python Library
description: Run tests for Python library using uv and pytest

inputs:
  python_version:
    description: 'Python version to test'
    required: true
  uv_version:
    description: 'UV version to use (default: latest)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: ${{ inputs.uv_version }}
        python-version: ${{ inputs.python_version }}

    - name: Install the project
      shell: bash
      run: uv sync --locked --all-extras --dev

    - name: Run Tests
      shell: bash
      run: uv run pytest
