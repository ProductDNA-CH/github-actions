name: Test clickup-status-sync
on:
  pull_request:
    paths: [clickup-status-sync/**]
permissions: {}
jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update && sudo apt-get install -y bats
      - run: bats clickup-status-sync/tests/sync.bats
